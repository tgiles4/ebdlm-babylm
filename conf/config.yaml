defaults:
  - dataset: strict
  - model: base
  - trainer: default
  - samples: default
  - logging: wandb
  - _self_

hydra:
  job:
    chdir: false

root: ${hydra:runtime.cwd}

context_length: 512
vocab_size: 16384

# Optional label for this training job. When null, train.py picks a unique folder
# under runs/ from timestamp, dataset slug, and git commit (when available).
run:
  name: null

paths:
  raw: ${root}/data/${dataset.slug}/raw
  pretokenized: ${root}/pretokenized/${dataset.slug}
  tokenizer: ${root}/tokenizers/tokenizer_${dataset.slug}.json
  # Set at train startup by training.run_dir.allocate_run_paths.
  checkpoints: null
  hf_export: null

pretokenize:
  num_workers: 16
  batch_size: 1000

tokenizer:
  min_frequency: 10
