# @package trainer
# BabyLM Strict-Small track — same objective/schedule family, smaller token batch.
# Assumes 4-GPU DDP.
#
# Global token batch = 8 × 1 × 4 × 512 = 16,384 tokens/step (GPT-BERT Strict-Small baseline).
# ~9,914 optimizer steps over 10 epochs.

max_epochs: 10

per_device_batch_size: 8
accumulate_grad_batches: 1

learning_rate: 2.0e-4
weight_decay: 0.1

lr_scheduler_type: cosine
# 1.6% warmup (~158 steps at ~9.9k total).
num_warmup_steps: 158

gradient_clip_val: 2.0
precision: bf16-mixed

checkpoint_every_n_steps: 2000
dataloader_num_workers: 4
