# @package trainer
# BabyLM Strict track — LLaDA masked diffusion, ModernBERT base (~120M).
# Assumes 2-GPU DDP (scripts/train_pretrain.slurm).
#
# Global token batch = per_device_batch_size × accumulate_grad_batches × num_gpus × context_length
#   128 × 1 × 2 × 512 = 131,072 tokens/step (GPT-BERT Strict baseline batch size).
# 2× A100 80GB: larger microbatches (~40–45 GB/GPU) vs 4× GPU at ~26% VRAM each.
# dataloader_num_workers: 0 avoids DDP + HF datasets worker hangs on Hopper.
# ~12,330 optimizer steps over 10 epochs at that throughput.

max_epochs: 10

per_device_batch_size: 128
accumulate_grad_batches: 1

learning_rate: 0.007
weight_decay: 0.1

lr_scheduler_type: cosine
# 1.6% warmup (BabyLM GPT-BERT convention; ~197 steps at ~12.3k total).
num_warmup_steps: 197

gradient_clip_val: 2.0
precision: bf16-mixed

checkpoint_every_n_steps: 2500
dataloader_num_workers: 0

# LLaDA pretrain: 1% of steps truncate to uniform random length in [1, context_length].
random_length_fraction: 0.01
